<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Diffuse — paste two stylesheets and instantly see what changed. Property-level CSS diffs, rendered live."
    />

    <title>Diffuse — Property-Level CSS Diff Tool</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/components/header.css" />
    <link rel="stylesheet" href="/css/components/inputs.css" />
    <link rel="stylesheet" href="/css/components/diff-output.css" />
    <link rel="stylesheet" href="/css/components/summary-bar.css" />
  </head>
  <body>
    <div class="app-wrapper">
      <!-- ── Header ── -->
      <header class="app-header" role="banner">
        <div class="header-brand">
          <!-- Logo mark: four horizontal bars representing a diff view -->
          <svg
            class="header-logo"
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 32 32"
            aria-hidden="true"
            focusable="false"
          >
            <rect width="32" height="32" rx="7" fill="#7c6af7" />
            <rect x="7" y="9" width="18" height="2.5" rx="1.25" fill="white" opacity="0.9" />
            <rect x="7" y="13.5" width="11" height="2.5" rx="1.25" fill="white" opacity="0.4" />
            <rect x="7" y="18" width="18" height="2.5" rx="1.25" fill="white" opacity="0.9" />
            <rect x="7" y="22.5" width="14" height="2.5" rx="1.25" fill="white" opacity="0.4" />
          </svg>
          <h1 class="header-title">diff<span class="header-title-accent">use</span></h1>
        </div>
        <p class="header-tagline">property-level CSS diffs, rendered live</p>
      </header>

      <!-- ── Three-panel layout ── -->
      <main class="app-main" id="app-main">
        <!-- Before panel -->
        <section class="panel panel--input panel--before" aria-labelledby="before-label">
          <div class="panel-header">
            <div class="panel-header-start">
              <span class="panel-dot panel-dot--before" aria-hidden="true"></span>
              <span class="panel-label panel-label--before" id="before-label">Before</span>
            </div>
            <span class="panel-hint" aria-hidden="true">paste original CSS</span>
          </div>
          <textarea
            id="css-before"
            class="css-editor"
            aria-label="Before: original stylesheet"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            wrap="off"
            placeholder="/* Paste your original CSS here */"
          ></textarea>
        </section>

        <!-- After panel -->
        <section class="panel panel--input panel--after" aria-labelledby="after-label">
          <div class="panel-header">
            <div class="panel-header-start">
              <span class="panel-dot panel-dot--after" aria-hidden="true"></span>
              <span class="panel-label panel-label--after" id="after-label">After</span>
            </div>
            <span class="panel-hint" aria-hidden="true">paste updated CSS</span>
          </div>
          <textarea
            id="css-after"
            class="css-editor"
            aria-label="After: updated stylesheet"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            wrap="off"
            placeholder="/* Paste your updated CSS here */"
          ></textarea>
        </section>

        <!-- Output panel -->
        <section class="panel panel--output" aria-label="Diff output">
          <!-- Summary bar — announces count changes to screen readers -->
          <div
            class="summary-bar"
            id="summary-bar"
            role="status"
            aria-live="polite"
            aria-atomic="true"
          >
            <div class="summary-counts" id="summary-counts">
              <span class="summary-placeholder">Paste CSS in both panels to see the diff</span>
            </div>
            <!-- Copy button: toggled visible by JS once a diff exists -->
            <button
              type="button"
              class="btn-copy"
              id="btn-copy"
              aria-label="Copy diff output as plain text"
              hidden
            >
              <!-- Copy icon (Lucide) -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
                focusable="false"
                class="icon-copy"
              >
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
              </svg>
              <!-- Check icon — shown briefly on copy success -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
                focusable="false"
                class="icon-check"
                hidden
              >
                <path d="M20 6 9 17l-5-5" />
              </svg>
              <span class="btn-copy-label">Copy</span>
            </button>
          </div>

          <!-- Diff area -->
          <div class="diff-container">
            <h2 class="sr-only" id="diff-heading">CSS diff results</h2>
            <div
              class="diff-scroller"
              id="diff-output"
              role="region"
              aria-labelledby="diff-heading"
              tabindex="0"
            >
              <!-- Empty state: shown until both inputs have content -->
              <div class="diff-empty" id="state-empty" aria-hidden="false">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="48"
                  height="48"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="diff-empty-icon"
                  aria-hidden="true"
                  focusable="false"
                >
                  <rect x="1" y="4" width="10" height="16" rx="1.5" />
                  <rect x="13" y="4" width="10" height="16" rx="1.5" />
                  <line x1="4" y1="8" x2="8" y2="8" />
                  <line x1="4" y1="11" x2="8" y2="11" />
                  <line x1="4" y1="14" x2="6" y2="14" />
                  <line x1="16" y1="8" x2="20" y2="8" />
                  <line x1="16" y1="11" x2="18" y2="11" />
                  <line x1="16" y1="14" x2="20" y2="14" />
                </svg>
                <p class="diff-empty-title">No diff yet</p>
                <p class="diff-empty-body">
                  Paste CSS into the Before and After panels. The diff updates as you type.
                </p>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
